server.port=8080
spring.application.name=revhire

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/revhire2_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Kumar@11
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=revhire_super_secret_key_2024_very_long_and_secure_jwt_secret_key_minimum_256_bits
jwt.expiration=86400000

# File Upload
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB
file.upload-dir=./uploads

# CORS
cors.allowed-origins=http://localhost:4200,https://revhire.in,http://revhire.in,https://www.revhire.in

# Logging
logging.level.com.revhire=DEBUG
logging.level.org.springframework.security=WARN
