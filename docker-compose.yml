services:

  db:
    image: mysql:8.0
    container_name: revhire-db
    restart: always
    environment:
      MYSQL_DATABASE: revhire
      MYSQL_USER: revuser
      MYSQL_PASSWORD: revpass
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "revuser", "-prevpass"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: revhire-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/revhire
      SPRING_DATASOURCE_USERNAME: revuser
      SPRING_DATASOURCE_PASSWORD: revpass
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: revhire-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql_data: